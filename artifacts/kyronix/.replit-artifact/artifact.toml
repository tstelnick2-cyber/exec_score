kind = "web"
previewPath = "/"
title = "Kyronix Executive Presence Score"
version = "1.0.0"
id = "artifacts/kyronix"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21331

[services.development]
run = "pnpm --filter @workspace/kyronix run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/kyronix", "run", "build" ]
serve = "static"
publicDir = "artifacts/kyronix/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21331"
BASE_PATH = "/"
